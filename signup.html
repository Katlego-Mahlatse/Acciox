<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>acciox - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Jedira font for brand name -->
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-analytics.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA3f6uz8DHZ9xeUFX-65XSAZQmKkAiHQp0",
            authDomain: "acciox.firebaseapp.com",
            projectId: "acciox",
            storageBucket: "acciox.firebasestorage.app",
            messagingSenderId: "899417289618",
            appId: "1:899417289618:web:b58c2a1da846e03058874b",
            measurementId: "G-TSG26XTRKW"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM elements
        const signupForm = document.getElementById('signupForm');
        const roleRadios = document.querySelectorAll('input[name="role"]');
        const companyFields = document.getElementById('companyFields');
        const adminFields = document.getElementById('adminFields');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        // Toggle fields based on selected role
        function toggleFields() {
            const selectedRole = document.querySelector('input[name="role"]:checked').value;
            if (selectedRole === 'company') {
                companyFields.classList.remove('hidden');
                adminFields.classList.add('hidden');
                // Make company name required
                document.getElementById('companyName').required = true;
                document.getElementById('adminUsername').required = false;
            } else {
                companyFields.classList.add('hidden');
                adminFields.classList.remove('hidden');
                document.getElementById('companyName').required = false;
                document.getElementById('adminUsername').required = true;
            }
        }

        roleRadios.forEach(radio => radio.addEventListener('change', toggleFields));
        // Initialize with default (company)
        toggleFields();

        // Handle sign up form submission
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const role = document.querySelector('input[name="role"]:checked').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Reset messages
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Store additional data in Firestore based on role
                if (role === 'company') {
                    const companyName = document.getElementById('companyName').value;
                    await setDoc(doc(db, "companies", user.uid), {
                        role: "company",
                        companyName: companyName,
                        email: email,
                        createdAt: new Date().toISOString(),
                        userId: user.uid
                    });
                } else { // admin
                    const username = document.getElementById('adminUsername').value;
                    await setDoc(doc(db, "admins", user.uid), {
                        role: "admin",
                        username: username,
                        email: email,
                        createdAt: new Date().toISOString(),
                        userId: user.uid
                    });
                }
                
                // Show success
                successDiv.classList.remove('hidden');
                successDiv.textContent = 'Account created successfully! Redirecting to login...';
                
                // Redirect to login.html after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                errorDiv.classList.remove('hidden');
                if (error.code === 'auth/email-already-in-use') {
                    errorDiv.textContent = 'This email is already registered. Please login instead.';
                } else if (error.code === 'auth/weak-password') {
                    errorDiv.textContent = 'Password should be at least 6 characters.';
                } else {
                    errorDiv.textContent = 'Error: ' + error.message;
                }
            }
        });
    </script>
    <style>
        body { background: black; }
        .jedira {
            font-family: 'Audiowide', cursive;
            letter-spacing: 1px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 70px;
            right: 20px;
            background: #1a1a1a;
            border: 1px solid #ff4500;
            border-radius: 12px;
            padding: 1rem;
            z-index: 50;
            min-width: 180px;
            box-shadow: 0 4px 20px rgba(255, 68, 0, 0.3);
        }
        .modal a {
            display: block;
            padding: 8px 12px;
            color: #ff6347;
            text-decoration: none;
            transition: all 0.2s;
            border-radius: 6px;
            font-family: system-ui, sans-serif;
        }
        .modal a:hover {
            background: #ff4500;
            color: black;
        }
    </style>
</head>
<body class="bg-black">
    <div class="min-h-screen flex flex-col">
        <!-- Navigation - identical to index but with black circle -->
        <nav class="flex justify-between items-center px-8 py-6 bg-orange-600">
            <div class="jedira text-3xl font-bold text-black tracking-wider">
                acciox
            </div>
            
            <div class="relative">
                <button id="hamburgerBtn" class="w-12 h-12 rounded-full bg-black flex flex-col items-center justify-center gap-1.5 hover:bg-gray-800 transition focus:outline-none">
                    <span class="w-5 h-0.5 bg-orange-500 rounded"></span>
                    <span class="w-5 h-0.5 bg-orange-500 rounded"></span>
                    <span class="w-5 h-0.5 bg-orange-500 rounded"></span>
                </button>
                <div id="popupModal" class="modal">
                    <a href="login.html">Login</a>
                    <a href="signup.html">Sign Up</a>
                    <a href="privacy.html">Privacy Policy</a>
                    <a href="contact.html">Contact</a>
                    <a href="moreinfo.html">More Info</a>
                </div>
            </div>
        </nav>

        <!-- Sign Up Form -->
        <div class="flex-1 flex items-center justify-center px-6 py-16">
            <div class="max-w-md w-full bg-black border border-orange-600 rounded-lg p-8">
                <h2 class="text-3xl font-bold text-orange-500 text-center mb-8">Create Account</h2>
                
                <form id="signupForm" class="space-y-6">
                    <!-- Role selection -->
                    <div class="flex gap-6 justify-center">
                        <label class="inline-flex items-center text-orange-400">
                            <input type="radio" name="role" value="company" checked class="mr-2 accent-orange-500"> Company
                        </label>
                        <label class="inline-flex items-center text-orange-400">
                            <input type="radio" name="role" value="admin" class="mr-2 accent-orange-500"> Admin
                        </label>
                    </div>
                    
                    <!-- Company fields -->
                    <div id="companyFields">
                        <label class="block text-orange-400 mb-2">Company Name</label>
                        <input type="text" id="companyName" class="w-full px-4 py-2 bg-gray-900 border border-orange-600 rounded-lg text-white focus:outline-none focus:border-red-500">
                    </div>
                    
                    <!-- Admin fields (hidden by default) -->
                    <div id="adminFields" class="hidden">
                        <label class="block text-orange-400 mb-2">Username</label>
                        <input type="text" id="adminUsername" class="w-full px-4 py-2 bg-gray-900 border border-orange-600 rounded-lg text-white focus:outline-none focus:border-red-500">
                    </div>
                    
                    <div>
                        <label class="block text-orange-400 mb-2">Email Address</label>
                        <input type="email" id="email" required class="w-full px-4 py-2 bg-gray-900 border border-orange-600 rounded-lg text-white focus:outline-none focus:border-red-500">
                    </div>
                    
                    <div>
                        <label class="block text-orange-400 mb-2">Password</label>
                        <input type="password" id="password" required minlength="6" class="w-full px-4 py-2 bg-gray-900 border border-orange-600 rounded-lg text-white focus:outline-none focus:border-red-500">
                        <p class="text-gray-500 text-sm mt-1">Minimum 6 characters</p>
                    </div>
                    
                    <div id="errorMessage" class="hidden text-red-500 text-sm bg-red-900/20 p-2 rounded"></div>
                    <div id="successMessage" class="hidden text-green-500 text-sm bg-green-900/20 p-2 rounded"></div>
                    
                    <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-black font-semibold py-2 rounded-lg transition">
                        Sign Up
                    </button>
                </form>
                
                <p class="text-center text-gray-400 mt-6">
                    Already have an account? <a href="login.html" class="text-orange-500 hover:text-red-500">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Hamburger menu toggle
        const btn = document.getElementById('hamburgerBtn');
        const modal = document.getElementById('popupModal');

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isVisible = modal.style.display === 'block';
            modal.style.display = isVisible ? 'none' : 'block';
        });

        document.addEventListener('click', (e) => {
            if (!btn.contains(e.target) && !modal.contains(e.target)) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
