<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>acciox - AI Bookkeeping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Jedira font (using Audiowide as approximation) -->
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <style>
        body { background: black; }
        .jedira {
            font-family: 'Audiowide', cursive;
            letter-spacing: 1px;
        }
        /* Custom modal popup */
        .modal {
            display: none;
            position: fixed;
            top: 70px;
            right: 20px;
            background: #1a1a1a;
            border: 1px solid #ff4500;
            border-radius: 12px;
            padding: 1rem;
            z-index: 50;
            min-width: 180px;
            box-shadow: 0 4px 20px rgba(255, 68, 0, 0.3);
        }
        .modal a {
            display: block;
            padding: 8px 12px;
            color: #ff6347;
            text-decoration: none;
            transition: all 0.2s;
            border-radius: 6px;
        }
        .modal a:hover {
            background: #ff4500;
            color: black;
        }
        /* Slideshow container */
        .slideshow-container {
            max-width: 1200px;
            margin: 2rem auto 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(255, 68, 0, 0.2);
        }
        .slide {
            display: none;
            width: 100%;
        }
        .slide img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
        }
        .fade {
            animation: fadeEffect 1s ease-in-out;
        }
        @keyframes fadeEffect {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="bg-black text-red-500">
    <div class="min-h-screen flex flex-col">
        <!-- Navigation with orange background -->
        <nav class="flex justify-between items-center px-8 py-6 bg-orange-600">
            <!-- Brand: acciox in black jedira font on left -->
            <div class="jedira text-3xl font-bold text-black tracking-wider">
                acciox
            </div>

            <!-- Hamburger Menu (Orange Circle + 3 Red Stripes) on right edge -->
            <div class="relative">
                <button id="hamburgerBtn" class="w-12 h-12 rounded-full bg-orange-800 flex flex-col items-center justify-center gap-1.5 hover:bg-orange-900 transition focus:outline-none">
                    <span class="w-5 h-0.5 bg-red-600 rounded"></span>
                    <span class="w-5 h-0.5 bg-red-600 rounded"></span>
                    <span class="w-5 h-0.5 bg-red-600 rounded"></span>
                </button>
                <!-- Popup Modal -->
                <div id="popupModal" class="modal">
                    <a href="login.html">🔐 Login</a>
                    <a href="signup.html">📝 Sign Up</a>
                    <a href="privacy.html">📄 Privacy Policy</a>
                    <a href="contact.html">📧 Contact</a>
                    <a href="moreinfo.html">ℹ️ More Info</a>
                </div>
            </div>
        </nav>

        <!-- Image Slideshow (between navbar and hero text) -->
        <div class="slideshow-container">
            <div class="slide fade">
                <img src="premium_photo-1663013659189-58ff1c9e1976.jpeg" alt="Bookkeeping slide 1">
            </div>
            <div class="slide fade">
                <img src="premium_photo-1661270415926-37a9d24aff30.jpeg" alt="Bookkeeping slide 2">
            </div>
            <div class="slide fade">
                <img src="photo-1719381565370-86f9d7a9fc34.jpeg" alt="Bookkeeping slide 3">
            </div>
            <div class="slide fade">
                <img src="photo-1526628953301-3e589a6a8b74.jpeg" alt="Bookkeeping slide 4">
            </div>
        </div>

        <!-- Hero Section (no buttons, no description with QuickBooks) -->
        <div class="flex-1 flex items-center justify-center px-6 py-16">
            <div class="max-w-4xl mx-auto text-center">
                <h1 class="text-6xl md:text-7xl font-bold mb-6">
                    <span class="text-orange-500">AI-Powered</span><br>
                    <span class="text-red-600">Bookkeeping Automation</span>
                </h1>
            </div>
        </div>
    </div>

    <script>
        // Slideshow logic - 3 seconds per image
        let slideIndex = 0;
        const slides = document.getElementsByClassName("slide");
        
        function showSlides() {
            // Hide all slides
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            // Move to next slide
            slideIndex++;
            if (slideIndex > slides.length) {
                slideIndex = 1;
            }
            // Show current slide
            slides[slideIndex - 1].style.display = "block";
            // Change image every 3 seconds
            setTimeout(showSlides, 3000);
        }
        
        // Start the slideshow when page loads
        showSlides();

        // Hamburger menu toggle
        const btn = document.getElementById('hamburgerBtn');
        const modal = document.getElementById('popupModal');

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isVisible = modal.style.display === 'block';
            modal.style.display = isVisible ? 'none' : 'block';
        });

        // Close modal when clicking outside
        document.addEventListener('click', (e) => {
            if (!btn.contains(e.target) && !modal.contains(e.target)) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
